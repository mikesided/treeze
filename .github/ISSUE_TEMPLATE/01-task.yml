name: Task
description: Track implementation work for Treeze
title: "[Task]: "
labels: ["type: task"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should this task accomplish?
      placeholder: "Example: Remove Session._node_tree and rely on PatchEngine snapshots."
    validations:
      required: true

  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
      description: What happens right now?
      placeholder: "Example: Session still stores the full root node tree."
    validations:
      required: false

  - type: textarea
    id: desired-behavior
    attributes:
      label: Desired behavior
      description: What should happen instead?
      placeholder: "Example: Session should only retain widgets, dirty state, and the patch engine."
    validations:
      required: true

  - type: textarea
    id: implementation-notes
    attributes:
      label: Implementation notes
      description: Related files, edge cases, or design notes.
      placeholder: |
        Related files:
        - treeze/runtime/session.py
        - treeze/runtime/patch_engine.py
    validations:
      required: false

  - type: checkboxes
    id: areas
    attributes:
      label: Areas affected
      options:
        - label: Runtime
        - label: Client
        - label: Widgets
        - label: Layout
        - label: Signals
        - label: Patches
        - label: Styling
        - label: Docs
        - label: Tests
        - label: Examples

  - type: checkboxes
    id: done-when
    attributes:
      label: Done when
      options:
        - label: Implementation is complete
        - label: Existing examples still run
        - label: New or updated test/example added if useful
        - label: Code is cleaned up